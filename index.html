<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Request Surat SIF 2026</title>
    
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-down': 'slideDown 0.3s ease-out',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        slideDown: { '0%': { opacity: '0', transform: 'translateY(-10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-50 via-purple-50 to-blue-50 min-h-screen text-gray-800 p-4 sm:p-8">

    <div class="max-w-3xl mx-auto animate-fade-in pb-10">
        
        <div class="text-center mb-8 pt-4">
            <h1 class="text-3xl md:text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-purple-600 mb-3 flex items-center justify-center gap-3">
                Form Request Surat SIF 2026 <span class="text-3xl">📝</span>
            </h1>
            <p class="text-gray-500 text-sm md:text-base">
                Isi form Request Surat di bawah, data otomatis masuk ke sistem.
            </p>
        </div>

        <div class="glass-card overflow-hidden shadow-2xl rounded-3xl relative">
            <div class="h-2 w-full bg-gradient-to-r from-pink-400 via-purple-400 to-blue-400 absolute top-0 left-0"></div>

            <div id="formScreen" class="p-6 md:p-8 pt-10">
                <form id="requestForm" class="space-y-8">
                    
                    <div class="space-y-4">
                        <h3 class="text-lg font-bold text-pink-500 flex items-center gap-2 border-b border-pink-100 pb-2">
                            <i data-lucide="user" class="w-5 h-5"></i> Data Diri
                        </h3>
                        <div class="grid md:grid-cols-2 gap-5">
                            <div class="space-y-1.5">
                                <label class="text-xs font-bold text-gray-500 uppercase ml-1">Siapa Namamu? <span class="text-red-500">*</span></label>
                                <input type="text" id="nama" required placeholder="Nama Panggilan/Lengkap" 
                                    class="w-full h-12 px-4 bg-white border border-gray-200 focus:border-pink-300 focus:ring-2 focus:ring-pink-100 rounded-xl outline-none transition-all">
                            </div>
                            <div class="space-y-1.5">
                                <label class="text-xs font-bold text-gray-500 uppercase ml-1">Nomor WA Aktif <span class="text-red-500">*</span></label>
                                <input type="tel" id="wa" required placeholder="08xxxxx / 628xxxxx" 
                                    class="w-full h-12 px-4 bg-white border border-gray-200 focus:border-pink-300 focus:ring-2 focus:ring-pink-100 rounded-xl outline-none transition-all">
                            </div>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <h3 class="text-lg font-bold text-purple-500 flex items-center gap-2 border-b border-purple-100 pb-2">
                            <i data-lucide="file-text" class="w-5 h-5"></i> Detail Surat
                        </h3>
                        
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-500 uppercase ml-1">Mau request apa nih? <span class="text-red-500">*</span></label>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                <label class="cursor-pointer">
                                    <input type="radio" name="jenisRequest" value="No. Surat/Sertifikat/Undangan" required class="peer hidden">
                                    <div class="flex items-center gap-3 border border-gray-200 bg-white p-3.5 rounded-xl peer-checked:bg-purple-50 peer-checked:border-purple-400 peer-checked:ring-1 peer-checked:ring-purple-200 transition-all">
                                        <div class="w-4 h-4 rounded-full border border-gray-300 peer-checked:border-purple-500 peer-checked:bg-purple-500 flex-shrink-0 flex items-center justify-center">
                                            <div class="w-2 h-2 rounded-full bg-white hidden peer-checked:block"></div>
                                        </div>
                                        <span class="text-sm font-medium text-gray-700 leading-snug">No. Surat/Sertifikat/Undangan</span>
                                    </div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="jenisRequest" value="No. Surat beserta isi Surat/Sertifikat/Undangan" required class="peer hidden">
                                    <div class="flex items-center gap-3 border border-gray-200 bg-white p-3.5 rounded-xl peer-checked:bg-purple-50 peer-checked:border-purple-400 peer-checked:ring-1 peer-checked:ring-purple-200 transition-all">
                                        <div class="w-4 h-4 rounded-full border border-gray-300 flex-shrink-0"></div>
                                        <span class="text-sm font-medium text-gray-700 leading-snug">No. Surat beserta isi Surat/Sertifikat/Undangan</span>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <div class="grid md:grid-cols-2 gap-5">
                            <div class="space-y-1.5">
                                <label class="text-xs font-bold text-gray-500 uppercase ml-1">Dari Divisi Apa? <span class="text-red-500">*</span></label>
                                <select id="divisi" required class="w-full h-12 px-4 bg-white border border-gray-200 focus:border-purple-300 focus:ring-2 focus:ring-purple-100 rounded-xl outline-none transition-all appearance-none cursor-pointer">
                                    <option value="" disabled selected>Pilih Divisi...</option>
                                    <option value="Proposal, LPJ dan Absensi">Proposal, LPJ dan Absensi</option>
                                    <option value="PDD dan Pubkon">PDD dan Pubkon</option>
                                    <option value="Acara dan Danus Bazar">Acara dan Danus Bazar</option>
                                    <option value="Sponsorship dan Konsumsi">Sponsorship dan Konsumsi</option>
                                    <option value="Bendahara dan Humas Perizinan">Bendahara dan Humas Perizinan</option>
                                    <option value="Keamanan dan Perlengkapan">Keamanan dan Perlengkapan</option>
                                </select>
                            </div>

                            <div class="space-y-1.5">
                                <label class="text-xs font-bold text-gray-500 uppercase ml-1">Perihal / Isi <span class="text-red-500">*</span></label>
                                <select id="perihal" required class="w-full h-12 px-4 bg-white border border-gray-200 focus:border-purple-300 focus:ring-2 focus:ring-purple-100 rounded-xl outline-none transition-all appearance-none cursor-pointer">
                                    <option value="" disabled selected>Pilih Perihal...</option>
                                    <option value="Peminjaman Tempat">Peminjaman Tempat</option>
                                    <option value="Peminjaman Barang/Alat">Peminjaman Barang/Alat</option>
                                    <option value="Undangan">Undangan</option>
                                    <option value="SIK (Surat Izin Kegiatan)">SIK (Surat Izin Kegiatan)</option>
                                    <option value="Lainnya">Lainnya...</option>
                                </select>
                            </div>
                        </div>

                        <div id="lokasiWrapper" class="space-y-1.5 hidden animate-slide-down">
                            <label class="text-xs font-bold text-purple-600 uppercase ml-1 flex items-center gap-1">
                                <i data-lucide="map-pin" class="w-4 h-4"></i> Nama Tempat/Ruangan <span class="text-red-500">*</span>
                            </label>
                            <input type="text" id="lokasi" placeholder="Misal: Ruang Lab Jaringan, Teaching Factory, dll." 
                                class="w-full h-12 px-4 bg-purple-50/50 border border-purple-200 focus:border-purple-400 focus:ring-2 focus:ring-purple-100 rounded-xl outline-none transition-all">
                        </div>

                        <div id="lainnyaWrapper" class="space-y-1.5 hidden animate-slide-down">
                            <label class="text-xs font-bold text-purple-600 uppercase ml-1 flex items-center gap-1">
                                <i data-lucide="pen-tool" class="w-4 h-4"></i> Tuliskan Perihal Lainnya <span class="text-red-500">*</span>
                            </label>
                            <input type="text" id="lainnyaInput" placeholder="Misal: Surat Keterangan Aktif, Permohonan Dana, dll." 
                                class="w-full h-12 px-4 bg-purple-50/50 border border-purple-200 focus:border-purple-400 focus:ring-2 focus:ring-purple-100 rounded-xl outline-none transition-all">
                        </div>

                        <div class="space-y-1.5">
                            <label class="text-xs font-bold text-gray-500 uppercase ml-1 flex items-center justify-between">
                                Tujuan Surat 
                                <span class="text-purple-500 text-[10px] bg-purple-50 px-2 py-0.5 rounded-full font-medium">Bisa lebih dari satu (Tekan Enter)</span>
                            </label>
                            <textarea id="tujuan" rows="3" placeholder="Yth. Tujuan 1&#10;Yth. Tujuan 2&#10;Yth. Tujuan 3..." 
                                class="w-full p-4 bg-white border border-gray-200 focus:border-purple-300 focus:ring-2 focus:ring-purple-100 rounded-xl outline-none transition-all resize-y"></textarea>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <h3 class="text-lg font-bold text-blue-500 flex items-center gap-2 border-b border-blue-100 pb-2">
                            <i data-lucide="calendar" class="w-5 h-5"></i> Waktu Penting
                        </h3>
                        <div class="space-y-1.5 w-full md:w-1/2">
                            <label class="text-xs font-bold text-red-500 uppercase ml-1">Deadline Request (H-1 Minggu) <span class="text-red-500">*</span></label>
                            <input type="date" id="deadline" required 
                                class="w-full h-12 px-4 bg-white border border-red-200 focus:border-red-400 focus:ring-2 focus:ring-red-100 rounded-xl outline-none transition-all cursor-pointer">
                        </div>
                    </div>

                    <div class="pt-4">
                        <button type="submit" id="submitBtn" class="w-full h-14 bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-600 hover:to-purple-700 rounded-2xl shadow-lg shadow-purple-200 text-white font-bold text-lg transition-transform active:scale-95 flex items-center justify-center gap-2">
                            <i data-lucide="send" id="btnIcon" class="w-5 h-5"></i> 
                            <span id="btnText">Kirim Request Sekarang</span>
                        </button>
                    </div>

                </form>
            </div>

            <div id="successScreen" class="hidden p-10 flex flex-col items-center text-center animate-fade-in py-16">
                <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mb-6 shadow-sm">
                    <i data-lucide="check-circle-2" class="text-green-600 w-12 h-12"></i>
                </div>
                <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-2">Request Berhasil Disimpan! 🎉</h2>
                <p class="text-gray-600 max-w-md mb-8">
                    Data kamu sudah masuk ke sistem. Silakan <strong>klik tombol di bawah</strong> untuk konfirmasi ke PIC Divisimu via WhatsApp.
                </p>

                <div id="cpContainer" class="w-full max-w-sm mb-8 flex justify-center">
                    </div>

                <button onclick="resetForm()" class="text-gray-500 hover:text-pink-500 font-medium transition-colors hover:underline">
                    &larr; Buat Request Lain
                </button>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();

        const formScreen = document.getElementById('formScreen');
        const successScreen = document.getElementById('successScreen');
        const requestForm = document.getElementById('requestForm');
        
        const perihalSelect = document.getElementById('perihal');
        const lokasiWrapper = document.getElementById('lokasiWrapper');
        const lokasiInput = document.getElementById('lokasi');
        const lainnyaWrapper = document.getElementById('lainnyaWrapper');
        const lainnyaInput = document.getElementById('lainnyaInput');
        
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const cpContainer = document.getElementById('cpContainer');

        let savedData = {};

        // KONFIGURASI ROUTING PER DIVISI
        const PIC_CONFIG = {
            "Proposal, LPJ dan Absensi": {
                namaPIC: "Abimanyu",
                nomorWA: "6282133751840",
                scriptUrl: "https://script.google.com/macros/s/AKfycbxwAzVhg6cioywJD06R1iIlWwRU0p1HgE3LuilvBhoZT4f8RrhmKCpnobsbJwSwrWbe/exec"
            },
            "PDD dan Pubkon": {
                namaPIC: "Nabhan",
                nomorWA: "62895422636194", 
                scriptUrl: "https://script.google.com/macros/s/AKfycbwP40GfZhp0l6womxy4pYjHhrgLncZQdnU9qghlvk-dITp78tt2WRat1Q7WJ_nRBvsHxA/exec"
            },
            "Acara dan Danus Bazar": {
                namaPIC: "Andin",
                nomorWA: "6282234460802", 
                scriptUrl: "https://script.google.com/macros/s/AKfycbwDjTSp8kkX9ysOLYl9Jgp-RXyCWwHK9mlrZy_llXQhyZhqatGcRXy0h9d8kbM2NaMqkg/exec"
            },
            "Sponsorship dan Konsumsi": {
                namaPIC: "Alya",
                nomorWA: "628xxxxxxxxx", 
                scriptUrl: "https://script.google.com/macros/s/AKfycbwxQ8LyQFCLJzRW0cHd8cf79NCOcyNWFqkMIUe2G8Gnu1oi6ZeyShVVvsrIpEmdjsJoLQ/exec"
            },
            "Bendahara dan Humas Perizinan": {
                namaPIC: "Alan",
                nomorWA: "628xxxxxxxxx", 
                scriptUrl: "URL_APPS_SCRIPT_SPREADSHEET_ALAN"
            },
            "Keamanan dan Perlengkapan": {
                namaPIC: "Fadia",
                nomorWA: "628xxxxxxxxx", 
                scriptUrl: "URL_APPS_SCRIPT_SPREADSHEET_FADIA"
            }
        };

        // Radio Button Styling
        const radioInputs = document.querySelectorAll('input[name="jenisRequest"]');
        radioInputs.forEach(radio => {
            radio.addEventListener('change', () => {
                document.querySelectorAll('.rounded-full.border-gray-300').forEach(div => {
                    div.classList.remove('border-purple-500', 'bg-purple-500');
                    div.innerHTML = '';
                });
                if (radio.checked) {
                    const circle = radio.nextElementSibling.querySelector('.rounded-full');
                    circle.classList.add('border-purple-500', 'bg-purple-500');
                    circle.innerHTML = '<div class="w-2 h-2 rounded-full bg-white"></div>';
                }
            });
        });

        // Tampilkan input dinamis berdasarkan Perihal
        perihalSelect.addEventListener('change', function() {
            lokasiWrapper.classList.add('hidden');
            lokasiInput.removeAttribute('required');
            lokasiInput.value = '';
            
            lainnyaWrapper.classList.add('hidden');
            lainnyaInput.removeAttribute('required');
            lainnyaInput.value = '';

            if (this.value === 'Peminjaman Tempat') {
                lokasiWrapper.classList.remove('hidden');
                lokasiInput.setAttribute('required', 'true');
            } else if (this.value === 'Lainnya') {
                lainnyaWrapper.classList.remove('hidden');
                lainnyaInput.setAttribute('required', 'true');
            }
        });

        requestForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Tangkap nilai perihal
            let perihalValue = document.getElementById('perihal').value;
            if (perihalValue === 'Lainnya') {
                perihalValue = document.getElementById('lainnyaInput').value;
            }

            // Tangkap dan pecah input Tujuan menjadi Array
            let rawTujuan = document.getElementById('tujuan').value;
            // Pisahkan berdasarkan Enter, hilangkan spasi depan-belakang, lalu filter yang kosong
            let tujuanArray = rawTujuan.split('\n').map(item => item.trim()).filter(item => item !== "");
            
            // Jika kosong sama sekali, beri nilai default
            if(tujuanArray.length === 0) {
                tujuanArray = ["-"];
            }

            savedData = {
                nama: document.getElementById('nama').value,
                wa: document.getElementById('wa').value,
                jenisRequest: document.querySelector('input[name="jenisRequest"]:checked').value,
                divisi: document.getElementById('divisi').value,
                perihal: perihalValue,
                lokasi: document.getElementById('lokasi').value,
                tujuan: tujuanArray, // <-- Di sini dikirim sebagai Array
                deadline: document.getElementById('deadline').value
            };

            const selectedPIC = PIC_CONFIG[savedData.divisi];

            submitBtn.disabled = true;
            btnText.innerText = "Sedang Mengirim...";
            btnIcon.setAttribute('data-lucide', 'loader-2');
            btnIcon.classList.add('animate-spin');
            lucide.createIcons();

            try {
                await fetch(selectedPIC.scriptUrl, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(savedData)
                });

                // Generate Tombol WA Dinamis
                cpContainer.innerHTML = `
                    <button onclick="sendWA('${selectedPIC.namaPIC}', '${selectedPIC.nomorWA}')" class="w-full h-14 bg-gradient-to-r from-green-500 to-emerald-600 hover:opacity-90 rounded-2xl shadow-lg shadow-green-100 text-lg font-bold text-white transition-transform hover:scale-[1.02] flex items-center justify-center gap-2">
                        <i data-lucide="message-circle" class="w-5 h-5"></i> Chat PIC: ${selectedPIC.namaPIC}
                    </button>
                `;

                formScreen.classList.add('hidden');
                successScreen.classList.remove('hidden');
                lucide.createIcons();
                window.scrollTo({ top: 0, behavior: 'smooth' });

            } catch (error) {
                console.error("Error:", error);
                alert("Gagal mengirim data. Cek koneksi internetmu.");
            } finally {
                submitBtn.disabled = false;
                btnText.innerText = "Kirim Request Sekarang";
                btnIcon.setAttribute('data-lucide', 'send');
                btnIcon.classList.remove('animate-spin');
                lucide.createIcons();
            }
        });

        const formatDateIndo = (dateStr) => {
            if (!dateStr) return "-";
            const date = new Date(dateStr);
            return date.toLocaleDateString("id-ID", { day: 'numeric', month: 'long', year: 'numeric' });
        };

        function sendWA(cpName, cpNumber) {
            const lokasiText = document.getElementById('perihal').value === "Peminjaman Tempat" ? `di *${savedData.lokasi}*` : "";
            
            // Format list tujuan untuk di WA
            const tujuanTextList = savedData.tujuan.map(t => `- ${t}`).join('\n');

            const text = `Halo kak ${cpName},

Aku *${savedData.nama}* dengan nomor wa *${savedData.wa}* mau request *${savedData.jenisRequest}*

dari divisi *${savedData.divisi}*
dengan perihal/isi *${savedData.perihal}* ${lokasiText}

dengan tujuan surat:
${tujuanTextList}

maksimal tanggal surat *${formatDateIndo(savedData.deadline)}*`;

            const encodedText = encodeURIComponent(text);
            window.open(`https://wa.me/${cpNumber}?text=${encodedText}`, "_blank");
        }

        function resetForm() {
            requestForm.reset();
            
            document.querySelectorAll('.rounded-full.border-gray-300').forEach(div => {
                div.classList.remove('border-purple-500', 'bg-purple-500');
                div.innerHTML = '';
            });

            lokasiWrapper.classList.add('hidden');
            lokasiInput.removeAttribute('required');
            
            lainnyaWrapper.classList.add('hidden');
            lainnyaInput.removeAttribute('required');

            successScreen.classList.add('hidden');
            formScreen.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
